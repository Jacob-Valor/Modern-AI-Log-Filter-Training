apiVersion: apps/v1
kind: Deployment
metadata:
  name: logfilter-api
  namespace: logfilter
  labels:
    app.kubernetes.io/name: logfilter-api
    app.kubernetes.io/component: api
    app.kubernetes.io/version: "0.1.0"
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: logfilter-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: logfilter-api
        app.kubernetes.io/component: api
        app.kubernetes.io/version: "0.1.0"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      initContainers:
        - name: model-download
          image: logfilter-api:latest
          imagePullPolicy: IfNotPresent
          command:
            - python
            - /app/scripts/download_hf_models.py
            - --config
            - /app/config/config.yaml
            - --cache-dir
            - /app/models/hf-cache
          env:
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: logfilter-secrets
                  key: HF_TOKEN
                  optional: true
          volumeMounts:
            - name: config
              mountPath: /app/config
              readOnly: true
            - name: hf-cache
              mountPath: /app/models/hf-cache
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
      containers:
        - name: api
          image: logfilter-api:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 2
          env:
            - name: LOGFILTER_ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: logfilter-secrets
                  key: LOGFILTER_ADMIN_TOKEN
            - name: LOGFILTER_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: logfilter-secrets
                  key: LOGFILTER_API_TOKEN
            - name: LOGFILTER_METRICS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: logfilter-secrets
                  key: LOGFILTER_METRICS_TOKEN
            - name: ES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: logfilter-secrets
                  key: ES_PASSWORD
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "logfilter-kafka:9092"
            - name: ES_HOST
              value: "http://logfilter-elasticsearch:9200"
            - name: LOGFILTER_ENABLE_DOCS
              value: "0"
            - name: LOGFILTER_MODEL_VERSION
              value: ""
            - name: HF_HOME
              value: "/app/models/hf-cache"
          resources:
            requests:
              memory: "2Gi"
              cpu: "1000m"
            limits:
              memory: "8Gi"
              cpu: "4000m"
          volumeMounts:
            - name: config
              mountPath: /app/config
              readOnly: true
            - name: models
              mountPath: /app/models
              readOnly: true
            - name: hf-cache
              mountPath: /app/models/hf-cache
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: config
          configMap:
            name: logfilter-config
        - name: models
          persistentVolumeClaim:
            claimName: logfilter-models-pvc
        - name: hf-cache
          emptyDir: {}
        - name: tmp
          emptyDir:
            sizeLimit: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: logfilter-api
  namespace: logfilter
  labels:
    app.kubernetes.io/name: logfilter-api
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: logfilter-api
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: logfilter-api
  namespace: logfilter
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: logfilter-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 10
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15

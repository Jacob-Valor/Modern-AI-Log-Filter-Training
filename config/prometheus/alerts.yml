groups:
  - name: logfilter
    interval: 30s
    rules:
      # ── Availability / Health ───────────────────────────────────────────
      - alert: LogfilterAPIDown
        expr: up{job="logfilter-api"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "LogFilter API is down"
          description: "The API has been unreachable for more than 1 minute."

      - alert: LogfilterModelNotLoaded
        expr: logfilter_model_loaded == 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "AI model {{ $labels.model }} not loaded"
          description: "Model {{ $labels.model }} has not been loaded for 2+ minutes."

      # ── SLO Definitions ──────────────────────────────────────────────────────
      # Latency SLO: 99% of requests complete within 500 ms.
      # Error budget: 1% of requests may exceed 500 ms in any 30-day window.
      # Burn-rate alert: fast burn (14.4x) → page within 2 hours of budget exhaustion.
      # Burn-rate alert: slow burn (2x) → ticket within 3 days of budget exhaustion.

      - alert: LogfilterHighLatencyP99
        expr: |
          histogram_quantile(0.99,
            rate(logfilter_scoring_latency_ms_bucket[5m])
          ) > 500
        for: 5m
        labels:
          severity: warning
          slo: "latency_p99_500ms"
        annotations:
          summary: "Scoring p99 latency > 500 ms (SLO breach)"
          description: "p99 scoring latency is {{ $value }} ms over the last 5 minutes. SLO: 99% < 500ms."

      - alert: LogfilterHighLatencyP95
        expr: |
          histogram_quantile(0.95,
            rate(logfilter_scoring_latency_ms_bucket[5m])
          ) > 200
        for: 5m
        labels:
          severity: warning
          slo: "latency_p95_200ms"
        annotations:
          summary: "Scoring p95 latency > 200 ms"
          description: "p95 scoring latency is {{ $value }} ms over the last 5 minutes."

      # ── Error-budget / burn-rate alerts ────────────────────────────────────
      - alert: LogfilterLatencyBudgetBurnFast
        expr: |
          (
            sum(rate(logfilter_scoring_latency_ms_bucket{le="500"}[1h]))
            /
            sum(rate(logfilter_scoring_latency_ms_bucket[1h]))
          ) < 0.99
        for: 10m
        labels:
          severity: critical
          slo: "latency_p99_500ms"
        annotations:
          summary: "Latency error budget burning fast (>14x)"
          description: "Less than 99% of requests are under 500ms in the last hour."

      - alert: LogfilterLatencyBudgetBurnSlow
        expr: |
          (
            sum(rate(logfilter_scoring_latency_ms_bucket{le="500"}[6h]))
            /
            sum(rate(logfilter_scoring_latency_ms_bucket[6h]))
          ) < 0.99
        for: 30m
        labels:
          severity: warning
          slo: "latency_p99_500ms"
        annotations:
          summary: "Latency error budget burning slow (>2x)"
          description: "Less than 99% of requests are under 500ms over the last 6 hours."

      # ── Throughput / Errors ────────────────────────────────────────────────
      - alert: LogfilterNoEventsScored
        expr: |
          rate(logfilter_events_total[5m]) == 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "No events scored in the last 10 minutes"
          description: "The scoring pipeline has not processed any events."

      # ── Anomaly / Security ─────────────────────────────────────────────────
      - alert: LogfilterHighThreatVolume
        expr: |
          rate(logfilter_events_total{priority="HIGH"}[5m]) > 10
        for: 5m
        labels:
          severity: info
        annotations:
          summary: "High volume of HIGH-priority events"
          description: "{{ $value }} HIGH-priority events/sec detected."

      - alert: LogfilterHighDuplicateRate
        expr: |
          rate(logfilter_events_duplicate_total[5m]) /
          rate(logfilter_events_total[5m]) > 0.5
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Duplicate event rate > 50%"
          description: "Over half of events are duplicates; check dedup window or upstream replay."

      - alert: LogfilterHighSigmaMatchRate
        expr: |
          rate(logfilter_events_sigma_total[5m]) /
          rate(logfilter_events_total[5m]) > 0.8
        for: 5m
        labels:
          severity: info
        annotations:
          summary: "Sigma match rate > 80%"
          description: "{{ $value }} of events match Sigma rules; verify rule calibration."

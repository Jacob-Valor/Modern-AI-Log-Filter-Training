global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

rule_files:
  - "/etc/prometheus/alerts.yml"

scrape_configs:
  - job_name: "logfilter-api"
    static_configs:
      - targets: ["logfilter-api:8080"]
    metrics_path: "/metrics"
    scrape_interval: 10s

  - job_name: "logfilter-collector"
    static_configs:
      - targets: ["logfilter-collector:9100"]
    metrics_path: "/metrics"
    scrape_interval: 10s

  - job_name: "logfilter-blackbox"
    metrics_path: "/probe"
    params:
      module: ["http_2xx"]
    static_configs:
      - targets: ["http://logfilter-api:8080/health"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: "blackbox-exporter:9115"

  - job_name: "kafka"
    static_configs:
      - targets: ["kafka:9308"]  # kafka-exporter if deployed

  - job_name: "elasticsearch"
    static_configs:
      - targets: ["elasticsearch:9114"]  # elasticsearch_exporter if deployed

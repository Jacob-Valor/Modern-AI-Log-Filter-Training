# ── Integration Test Infrastructure ────────────────────────────────────────────
# Lightweight stack for pytest integration tests.
# Usage:
#   docker compose -f docker-compose.test.yml up -d
#   pytest tests/integration/
#   docker compose -f docker-compose.test.yml down -v
# ───────────────────────────────────────────────────────────────────────────────

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: logfilter-test-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "127.0.0.1:12181:2181"
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - zookeeper-test-data:/var/lib/zookeeper/data
      - zookeeper-test-log:/var/lib/zookeeper/log

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: logfilter-test-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "127.0.0.1:19092:9092"
    environment:
      KAFKA_BROKER_ID: 99
      KAFKA_ZOOKEEPER_CONNECT: "zookeeper:2181"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:19092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:29092"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - kafka-test-data:/var/lib/kafka/data

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: logfilter-test-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "127.0.0.1:19200:9200"
    healthcheck:
      test:
        - "CMD-SHELL"
        - "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"\\(green\\|yellow\\)\"'"
      interval: 15s
      timeout: 5s
      retries: 10
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - es-test-data:/usr/share/elasticsearch/data

volumes:
  zookeeper-test-data:
  zookeeper-test-log:
  kafka-test-data:
  es-test-data:

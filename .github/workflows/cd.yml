# Required repository settings:
# - GitHub Packages/GHCR write access for this repository or organization.
# - GitHub Code Scanning enabled if SARIF upload results should appear in Security.
# - GitHub Actions OIDC enabled for Sigstore keyless cosign signing.
name: CD

on:
  push:
    tags:
      - "v*"
  release:
    types:
      - published

permissions:
  contents: read
  packages: write
  id-token: write
  security-events: write

jobs:
  publish-images:
    name: Build, scan, sign, and publish ${{ matrix.service }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: logfilter-api
            dockerfile: docker/api/Dockerfile
          - service: logfilter-collector
            dockerfile: docker/collector/Dockerfile
          - service: logfilter-router
            dockerfile: docker/router/Dockerfile
          - service: logfilter-archive
            dockerfile: docker/archive/Dockerfile

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.service }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true

      - name: Generate SBOM artifact
        uses: anchore/sbom-action@v0
        continue-on-error: true
        with:
          image: ghcr.io/${{ github.repository_owner }}/${{ matrix.service }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: sbom-${{ matrix.service }}.spdx.json

      - name: Upload SBOM artifact
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.service }}
          path: sbom-${{ matrix.service }}.spdx.json
          if-no-files-found: warn

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image digest with keyless cosign
        env:
          IMAGE_DIGEST: ghcr.io/${{ github.repository_owner }}/${{ matrix.service }}@${{ steps.build.outputs.digest }}
        run: cosign sign --yes "$IMAGE_DIGEST"

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/${{ matrix.service }}@${{ steps.build.outputs.digest }}
          format: sarif
          output: trivy-${{ matrix.service }}.sarif
          severity: CRITICAL,HIGH

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        continue-on-error: true
        with:
          sarif_file: trivy-${{ matrix.service }}.sarif

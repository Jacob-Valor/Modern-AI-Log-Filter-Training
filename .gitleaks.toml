# Gitleaks configuration — suppress false positives from legitimate patterns
# in config files, documentation, and regex patterns used for PII redaction.
#
# Rules: use gitleaks built-in rules only (no custom detection rules).
# Allowlist: suppress findings in files with legitimate patterns.

[allowlist]
paths = [
    # Apache-2.0 license text contains "example" — false positive
    '''LICENSE''',
    # Docker compose healthchecks use `test:` key — triggers generic secret rules
    '''docker-compose\.ya?ml$''',
    '''docker-compose\.prod\.ya?ml$''',
    # Redaction module contains regex patterns (AKIA, xox, etc.) as *code*, not secrets
    '''src/logfilter/security/redaction\.py$''',
    # Test scripts with "test" in output messages
    '''scripts/smoke_test\.py$''',
    '''scripts/smoke_test_pipeline\.py$''',
    '''scripts/smoke_test_real_scorer\.py$''',
    # Self-signed dev TLS certs are not production secrets
    '''scripts/certs/''',
    # Test fixtures intentionally contain realistic tokens for PII testing
    '''tests/''',
    # Documentation references examples — not real secrets
    '''SECURITY\.md$''',
    '''docs/''',
]

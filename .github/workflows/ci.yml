name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  fast-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install fast-check dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . --no-deps
          python -m pip install -c requirements.txt \
            PyYAML \
            fastapi \
            httpx \
            elasticsearch \
            kafka-python \
            numpy \
            prometheus-client \
            pydantic \
            structlog
          python -m pip install \
            pytest \
            pytest-asyncio \
            pytest-cov \
            ruff

      - name: Lint
        run: python -m ruff check src/ tests/ training/

      - name: Unit tests
        run: python -m pytest tests/ --cov=src/logfilter --cov-report=term-missing

      - name: Pipeline smoke test
        run: python scripts/smoke_test_pipeline.py

  dependency-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Audit dependency lower bounds
        shell: bash
        run: |
          python -m pip install --upgrade pip pip-audit
          python -m pip_audit \
            -r <(awk 'BEGIN{FS=">="} /^[A-Za-z0-9_.-]+(\[[^]]+\])?>=/{print $1"=="$2}' requirements.txt) \
            --no-deps \
            --disable-pip \
            --progress-spinner off

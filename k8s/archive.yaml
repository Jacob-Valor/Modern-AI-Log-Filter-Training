apiVersion: apps/v1
kind: Deployment
metadata:
  name: logfilter-archive
  namespace: logfilter
  labels:
    app.kubernetes.io/name: logfilter-archive
    app.kubernetes.io/component: archive
    app.kubernetes.io/version: "0.1.0"
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: logfilter-archive
  template:
    metadata:
      labels:
        app.kubernetes.io/name: logfilter-archive
        app.kubernetes.io/component: archive
        app.kubernetes.io/version: "0.1.0"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: archive
          image: logfilter-archive:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          livenessProbe:
            exec:
              command:
                - pgrep
                - -f
                - python
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - pgrep
                - -f
                - python
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 2
          env:
            - name: ES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: logfilter-secrets
                  key: ES_PASSWORD
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "logfilter-kafka:9092"
            - name: KAFKA_SECURITY_PROTOCOL
              valueFrom:
                configMapKeyRef:
                  name: logfilter-config
                  key: KAFKA_SECURITY_PROTOCOL
            - name: KAFKA_SASL_MECHANISM
              valueFrom:
                configMapKeyRef:
                  name: logfilter-config
                  key: KAFKA_SASL_MECHANISM
            - name: KAFKA_SASL_USERNAME
              valueFrom:
                secretKeyRef:
                  name: logfilter-secrets
                  key: KAFKA_SASL_USERNAME
            - name: KAFKA_SASL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: logfilter-secrets
                  key: KAFKA_SASL_PASSWORD
            - name: KAFKA_SSL_CAFILE
              valueFrom:
                configMapKeyRef:
                  name: logfilter-config
                  key: KAFKA_SSL_CAFILE
            - name: KAFKA_SSL_CERTFILE
              valueFrom:
                configMapKeyRef:
                  name: logfilter-config
                  key: KAFKA_SSL_CERTFILE
            - name: KAFKA_SSL_KEYFILE
              valueFrom:
                configMapKeyRef:
                  name: logfilter-config
                  key: KAFKA_SSL_KEYFILE
            - name: KAFKA_SSL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: logfilter-secrets
                  key: KAFKA_SSL_PASSWORD
            - name: KAFKA_SSL_CHECK_HOSTNAME
              valueFrom:
                configMapKeyRef:
                  name: logfilter-config
                  key: KAFKA_SSL_CHECK_HOSTNAME
            - name: ES_HOST
              value: "http://logfilter-elasticsearch:9200"
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          volumeMounts:
            - name: config
              mountPath: /app/config
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: config
          configMap:
            name: logfilter-config
        - name: tmp
          emptyDir:
            sizeLimit: 256Mi

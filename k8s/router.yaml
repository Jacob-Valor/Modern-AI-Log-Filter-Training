apiVersion: apps/v1
kind: Deployment
metadata:
  name: logfilter-router
  namespace: logfilter
  labels:
    app.kubernetes.io/name: logfilter-router
    app.kubernetes.io/component: router
    app.kubernetes.io/version: "0.1.0"
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: logfilter-router
  template:
    metadata:
      labels:
        app.kubernetes.io/name: logfilter-router
        app.kubernetes.io/component: router
        app.kubernetes.io/version: "0.1.0"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: router
          image: logfilter-router:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: LOGFILTER_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: logfilter-secrets
                  key: LOGFILTER_API_TOKEN
            - name: ES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: logfilter-secrets
                  key: ES_PASSWORD
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "logfilter-kafka:9092"
            - name: ES_HOST
              value: "http://logfilter-elasticsearch:9200"
            - name: LOGFILTER_API_URL
              value: "http://logfilter-api:8080"
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          volumeMounts:
            - name: config
              mountPath: /app/config
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: logfilter-config

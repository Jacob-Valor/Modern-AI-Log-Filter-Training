# ── AI Log Filter — Full Production Stack ─────────────────────────────────────
#
# Services:
#   zookeeper      — Kafka coordination
#   kafka          — Message bus (raw-logs, scored-logs topics)
#   kafka-init     — One-shot topic creation
#   elasticsearch  — Raw log archive (archive-first pattern)
#   kibana         — ES dashboard (optional, dev only)
#   archive        — Kafka consumer → Elasticsearch raw-log archive
#   logfilter-api  — FastAPI AI scoring service (SecureBERT2.0 models)
#   collector      — Syslog receiver → Kafka producer
#   router         — Kafka consumer → LEEF enricher → QRadar syslog forwarder
#   otel-collector — OpenTelemetry trace collector
#   prometheus     — Metrics scraping
#   grafana        — Dashboard
#
# Usage:
#   docker compose up -d           # start all services
#   docker compose up logfilter-api # start only the API
#   docker compose logs -f router  # tail router logs
#
# Environment variables (override via .env file):
#   KAFKA_BOOTSTRAP_SERVERS  ES_HOST  ES_USER  ES_PASSWORD  QRADAR_HOST
#   LOGFILTER_SCORE_HIGH  LOGFILTER_SCORE_MEDIUM  LOGFILTER_SCORE_LOW
#   LOGFILTER_TIER2_UNCERTAINTY_LOW  LOGFILTER_TIER2_UNCERTAINTY_HIGH

x-common-env: &common-env
  KAFKA_BOOTSTRAP_SERVERS: "kafka:29092"
  KAFKA_SECURITY_PROTOCOL: "${KAFKA_SECURITY_PROTOCOL:-PLAINTEXT}"
  KAFKA_SASL_MECHANISM: "${KAFKA_SASL_MECHANISM:-}"
  KAFKA_SASL_USERNAME: "${KAFKA_SASL_USERNAME:-}"
  KAFKA_SASL_PASSWORD: "${KAFKA_SASL_PASSWORD:-}"
  KAFKA_SSL_CAFILE: "${KAFKA_SSL_CAFILE:-}"
  KAFKA_SSL_CERTFILE: "${KAFKA_SSL_CERTFILE:-}"
  KAFKA_SSL_KEYFILE: "${KAFKA_SSL_KEYFILE:-}"
  KAFKA_SSL_PASSWORD: "${KAFKA_SSL_PASSWORD:-}"
  KAFKA_SSL_CHECK_HOSTNAME: "${KAFKA_SSL_CHECK_HOSTNAME:-true}"
  ES_HOST: "http://elasticsearch:9200"
  ES_USER: "elastic"
  # ES_PASSWORD MUST be supplied via .env (no default). docker compose will
  # fail loudly if unset, which is intentional — this is security telemetry.
  ES_PASSWORD: "${ES_PASSWORD:?ES_PASSWORD must be set in .env}"
  QRADAR_HOST: "${QRADAR_HOST:-localhost}"
  LOGFILTER_ADMIN_TOKEN: "${LOGFILTER_ADMIN_TOKEN:?LOGFILTER_ADMIN_TOKEN must be set in .env}"
  LOGFILTER_API_TOKEN: "${LOGFILTER_API_TOKEN:?LOGFILTER_API_TOKEN must be set in .env}"
  LOGFILTER_METRICS_TOKEN: "${LOGFILTER_METRICS_TOKEN:-}"
  LOGFILTER_SCORE_HIGH: "${LOGFILTER_SCORE_HIGH:-0.80}"
  LOGFILTER_SCORE_MEDIUM: "${LOGFILTER_SCORE_MEDIUM:-0.50}"
  LOGFILTER_SCORE_LOW: "${LOGFILTER_SCORE_LOW:-0.20}"
  LOGFILTER_TIER2_UNCERTAINTY_LOW: "${LOGFILTER_TIER2_UNCERTAINTY_LOW:-0.10}"
  LOGFILTER_TIER2_UNCERTAINTY_HIGH: "${LOGFILTER_TIER2_UNCERTAINTY_HIGH:-0.90}"
  OTEL_SERVICE_NAME: "${OTEL_SERVICE_NAME:-logfilter}"
  OTEL_EXPORTER_OTLP_ENDPOINT: "${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4317}"
  OTEL_EXPORTER_OTLP_PROTOCOL: "${OTEL_EXPORTER_OTLP_PROTOCOL:-grpc}"
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUNBUFFERED: "1"

x-python-service-security: &python-service-security
  security_opt:
    - "no-new-privileges:true"
  cap_drop:
    - ALL
  read_only: true
  tmpfs:
    - /tmp:rw,noexec,nosuid,size=256m

services:

  # ── Kafka infrastructure ───────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    hostname: zookeeper
    container_name: logfilter-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-log:/var/lib/zookeeper/log
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    hostname: kafka
    container_name: logfilter-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "127.0.0.1:9092:9092"       # local dev access only
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: "zookeeper:2181"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_LOG_RETENTION_HOURS: 168      # 7 days
      KAFKA_LOG_SEGMENT_BYTES: 1073741824 # 1 GB
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:29092"]
      interval: 15s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    container_name: logfilter-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        kafka-topics --create --if-not-exists \
          --bootstrap-server kafka:29092 \
          --replication-factor 1 --partitions 12 \
          --topic raw-logs
        kafka-topics --create --if-not-exists \
          --bootstrap-server kafka:29092 \
          --replication-factor 1 --partitions 12 \
          --topic scored-logs
        kafka-topics --create --if-not-exists \
          --bootstrap-server kafka:29092 \
          --replication-factor 1 --partitions 4 \
          --topic archived-logs
        kafka-topics --create --if-not-exists \
          --bootstrap-server kafka:29092 \
          --replication-factor 1 --partitions 4 \
          --topic logfilter-dlq
        echo "Kafka topics created."
    restart: "no"

  # ── Elasticsearch (raw log archive) ───────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: logfilter-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - ELASTIC_PASSWORD=${ES_PASSWORD:?ES_PASSWORD must be set in .env}
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
      - cluster.name=logfilter-cluster
    ports:
      - "127.0.0.1:9200:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test:
        - "CMD-SHELL"
        - "curl -su elastic:$$ELASTIC_PASSWORD http://localhost:9200/_cluster/health | grep -q '\"status\":\"\\(green\\|yellow\\)\"'"
      interval: 20s
      timeout: 10s
      retries: 5
    ulimits:
      memlock:
        soft: -1
        hard: -1
    restart: unless-stopped

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.0
    container_name: logfilter-kibana
    depends_on:
      elasticsearch:
        condition: service_healthy
    ports:
      - "127.0.0.1:5601:5601"
    environment:
      ELASTICSEARCH_HOSTS: '["http://elasticsearch:9200"]'
      ELASTICSEARCH_USERNAME: elastic
      ELASTICSEARCH_PASSWORD: ${ES_PASSWORD:?ES_PASSWORD must be set in .env}
    profiles: ["dev"]   # only started with: docker compose --profile dev up
    restart: unless-stopped

  # ── Raw Log Archiver (Kafka → Elasticsearch) ─────────────────────────────
  archive:
    <<: *python-service-security
    build:
      context: .
      dockerfile: docker/archive/Dockerfile
    container_name: logfilter-archive
    depends_on:
      kafka:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    environment:
      <<: *common-env
    volumes:
      - ./config:/app/config:ro
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
    restart: unless-stopped

  # ── AI Scoring API ─────────────────────────────────────────────────────────
  logfilter-api:
    <<: *python-service-security
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    container_name: logfilter-api
    depends_on:
      kafka:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      <<: *common-env
      REDIS_URL: "redis://redis:6379/0"
    volumes:
      - ./config:/app/config:ro
      - ./models:/app/models:ro          # trained ONNX + scaler
      - hf-cache:/app/hf-cache:rw        # HuggingFace model cache (matches HF_HOME in Dockerfile)
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      start_period: 120s   # allow time for model downloads on first start
      retries: 3
    deploy:
      resources:
        limits:
          memory: 8G
          cpus: "4.0"
    restart: unless-stopped

  # ── TLS Reverse Proxy (nginx → API) ─────────────────────────────────────
  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    container_name: logfilter-nginx
    depends_on:
      logfilter-api:
        condition: service_healthy
    ports:
      - "127.0.0.1:443:443"
      - "127.0.0.1:80:80"
    volumes:
      - ./scripts/certs/services-server.crt:/etc/tls/server.crt:ro
      - ./scripts/certs/services-server.key:/etc/tls/server.key:ro
      - ./config/nginx/nginx.conf:/etc/nginx/conf.d/logfilter.conf:ro
    healthcheck:
      test: ["CMD", "curl", "-fsk", "https://localhost/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ── Log Collector (syslog listener → Kafka) ────────────────────────────────
  collector:
    <<: *python-service-security
    build:
      context: .
      dockerfile: docker/collector/Dockerfile
    container_name: logfilter-collector
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "127.0.0.1:5140:5140/udp"   # local dev; expose via trusted load balancer in prod
      - "127.0.0.1:5140:5140/tcp"   # local dev; expose via trusted load balancer in prod
      - "127.0.0.1:9100:9100/tcp"   # Prometheus metrics (SYSLOG_METRICS_PORT)
    environment:
      <<: *common-env
      SYSLOG_ALLOWED_CIDRS: "${SYSLOG_ALLOWED_CIDRS:-127.0.0.1/32,::1/128}"
      SYSLOG_METRICS_PORT: "${SYSLOG_METRICS_PORT:-9100}"
    volumes:
      - ./config:/app/config:ro
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
    restart: unless-stopped

  # ── Router (Kafka consumer → LEEF → QRadar) ───────────────────────────────
  router:
    <<: *python-service-security
    build:
      context: .
      dockerfile: docker/router/Dockerfile
    container_name: logfilter-router
    depends_on:
      kafka:
        condition: service_healthy
      logfilter-api:
        condition: service_healthy
    environment:
      <<: *common-env
    volumes:
      - ./config:/app/config:ro
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
    restart: unless-stopped

  # ── OpenTelemetry Collector ────────────────────────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.99.0
    container_name: logfilter-otel-collector
    command: ["--config=/etc/otelcol/config.yaml"]
    ports:
      - "127.0.0.1:4317:4317"   # OTLP gRPC
      - "127.0.0.1:4318:4318"   # OTLP HTTP
    volumes:
      - ./config/otel-collector.yml:/etc/otelcol/config.yaml:ro
    restart: unless-stopped

  # ── Alertmanager ──────────────────────────────────────────────────────────
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: logfilter-alertmanager
    ports:
      - "127.0.0.1:9093:9093"
    volumes:
      - ./config/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    restart: unless-stopped

  # ── Prometheus ─────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: logfilter-prometheus
    depends_on:
      - alertmanager
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./config/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
      - "--rules.alert.resend-delay=1m"
    restart: unless-stopped

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7.4-alpine
    container_name: logfilter-redis
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ── Grafana ────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    container_name: logfilter-grafana
    depends_on:
      - prometheus
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      # Grafana admin password MUST be supplied via .env. Default-credentials
      # were removed because dashboards may surface scored telemetry.
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD must be set in .env}"
      GF_SECURITY_ADMIN_USER: "${GRAFANA_ADMIN_USER:-admin}"
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./config/grafana/dashboards:/etc/grafana/dashboards:ro
    restart: unless-stopped

# ── Volumes ────────────────────────────────────────────────────────────────────
secrets:
  kafka_keystore_creds:
    file: ./scripts/certs/keystore_creds
  kafka_sslkey_creds:
    file: ./scripts/certs/sslkey_creds
  kafka_truststore_creds:
    file: ./scripts/certs/truststore_creds

volumes:
  zookeeper-data:
  zookeeper-log:
  kafka-data:
  es-data:
  prometheus-data:
  alertmanager-data:
  grafana-data:
  hf-cache:   # persist HuggingFace model downloads across container restarts
  redis-data:

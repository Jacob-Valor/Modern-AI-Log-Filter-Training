services:
  kafka:
    hostname: kafka
    ports: []
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: "zookeeper:2181"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"

  kafka-2:
    image: confluentinc/cp-kafka:7.6.0
    hostname: kafka-2
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 2
      KAFKA_ZOOKEEPER_CONNECT: "zookeeper:2181"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-2:29092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    volumes:
      - kafka-data-2:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:29092"]
      interval: 15s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  kafka-3:
    image: confluentinc/cp-kafka:7.6.0
    hostname: kafka-3
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 3
      KAFKA_ZOOKEEPER_CONNECT: "zookeeper:2181"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-3:29092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    volumes:
      - kafka-data-3:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:29092"]
      interval: 15s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  kafka-init:
    depends_on:
      kafka:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy
    command:
      - |
        kafka-topics --create --if-not-exists --bootstrap-server kafka:29092,kafka-2:29092,kafka-3:29092 --replication-factor 3 --partitions 12 --topic raw-logs
        kafka-topics --create --if-not-exists --bootstrap-server kafka:29092,kafka-2:29092,kafka-3:29092 --replication-factor 3 --partitions 12 --topic scored-logs
        kafka-topics --create --if-not-exists --bootstrap-server kafka:29092,kafka-2:29092,kafka-3:29092 --replication-factor 3 --partitions 4 --topic archived-logs
        kafka-topics --create --if-not-exists --bootstrap-server kafka:29092,kafka-2:29092,kafka-3:29092 --replication-factor 3 --partitions 4 --topic logfilter-dlq
        echo "Kafka topics created with replication factor 3."

  elasticsearch:
    hostname: elasticsearch
    environment:
      - node.name=elasticsearch
      - cluster.name=logfilter-cluster
      - discovery.seed_hosts=elasticsearch,elasticsearch-2,elasticsearch-3
      - cluster.initial_master_nodes=elasticsearch,elasticsearch-2,elasticsearch-3
      - xpack.security.enabled=true
      - ELASTIC_PASSWORD=${ES_PASSWORD:?ES_PASSWORD must be set in .env}
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"

  elasticsearch-2:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    hostname: elasticsearch-2
    environment:
      - node.name=elasticsearch-2
      - cluster.name=logfilter-cluster
      - discovery.seed_hosts=elasticsearch,elasticsearch-2,elasticsearch-3
      - cluster.initial_master_nodes=elasticsearch,elasticsearch-2,elasticsearch-3
      - xpack.security.enabled=true
      - ELASTIC_PASSWORD=${ES_PASSWORD:?ES_PASSWORD must be set in .env}
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
    volumes:
      - es-data-2:/usr/share/elasticsearch/data
    ulimits:
      memlock:
        soft: -1
        hard: -1
    healthcheck:
      test:
        - "CMD-SHELL"
        - "curl -su elastic:$$ELASTIC_PASSWORD http://localhost:9200/_cluster/health | grep -q '\"status\":\"\\(green\\|yellow\\)\"'"
      interval: 20s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  elasticsearch-3:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    hostname: elasticsearch-3
    environment:
      - node.name=elasticsearch-3
      - cluster.name=logfilter-cluster
      - discovery.seed_hosts=elasticsearch,elasticsearch-2,elasticsearch-3
      - cluster.initial_master_nodes=elasticsearch,elasticsearch-2,elasticsearch-3
      - xpack.security.enabled=true
      - ELASTIC_PASSWORD=${ES_PASSWORD:?ES_PASSWORD must be set in .env}
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
    volumes:
      - es-data-3:/usr/share/elasticsearch/data
    ulimits:
      memlock:
        soft: -1
        hard: -1
    healthcheck:
      test:
        - "CMD-SHELL"
        - "curl -su elastic:$$ELASTIC_PASSWORD http://localhost:9200/_cluster/health | grep -q '\"status\":\"\\(green\\|yellow\\)\"'"
      interval: 20s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  logfilter-api:
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092,kafka-2:29092,kafka-3:29092
      ES_HOST: http://elasticsearch:9200

  collector:
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092,kafka-2:29092,kafka-3:29092

  archive:
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092,kafka-2:29092,kafka-3:29092
      ES_HOST: http://elasticsearch:9200

  router:
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092,kafka-2:29092,kafka-3:29092

volumes:
  kafka-data-2:
  kafka-data-3:
  es-data-2:
  es-data-3:

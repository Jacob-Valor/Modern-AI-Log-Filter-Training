name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - dev

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for committed secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  fast-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install fast-check dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . --no-deps
          python -m pip install -r requirements.txt
          python -m pip install \
            pytest \
            pytest-asyncio \
            pytest-cov \
            ruff

      - name: Lint
        run: python -m ruff check src/ tests/ training/

      - name: Type check
        run: |
          python -m pip install mypy
          python -m mypy src/logfilter --ignore-missing-imports --no-error-summary

      - name: Unit tests
        run: python -m pytest tests/ -m "not integration" --cov=src/logfilter --cov-report=term-missing

      - name: Pipeline smoke test
        run: python scripts/smoke_test_pipeline.py

  dependency-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Audit dependency lower bounds
        shell: bash
        run: |
          python -m pip install --upgrade pip pip-audit
          python -m pip_audit \
            -r <(awk 'BEGIN{FS=">="} /^[A-Za-z0-9_.-]+(\[[^]]+\])?>=/{gsub(/,.*/,"",$2); print $1"=="$2}' requirements.txt) \
            --no-deps \
            --disable-pip \
            --progress-spinner off

  integration-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: fast-checks

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . --no-deps
          python -m pip install -r requirements.txt
          python -m pip install pytest pytest-asyncio

      - name: Start test stack
        run: docker compose -f docker-compose.test.yml up -d --wait

      - name: Integration tests
        run: python -m pytest tests/integration/ -v -m integration --tb=short

      - name: Teardown test stack
        if: always()
        run: docker compose -f docker-compose.test.yml down -v
